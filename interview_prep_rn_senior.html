    tag: "rn", tagLabel: "React Native",
    q: "Как работает архитектура React Native? Чем Old Architecture отличается от New Architecture (JSI, Fabric, TurboModules)?",
    a: `<strong>Old Architecture</strong> использует JavaScript Bridge — асинхронную JSON-сериализацию для общения JS и нативного слоя. Это bottleneck: все данные сериализуются/десериализуются, вызовы батчатся.<br><br>
<strong>New Architecture</strong> (стабильна с RN 0.73+):<br>
<ul>
  <li><strong>JSI (JavaScript Interface)</strong> — C++ слой, JS напрямую держит ссылки на нативные объекты, zero serialization overhead</li>
  <li><strong>Fabric</strong> — новый рендер на C++, синхронные layout-вычисления, поддержка Concurrent Features React 18</li>
  <li><strong>TurboModules</strong> — нативные модули загружаются лениво (lazy), типы генерируются из Codegen</li>
  <li><strong>Codegen</strong> — статическая типизация интерфейсов между JS и native через Flow/TS схемы</li>
</ul>
<div class="tip">💡 На практике: если у тебя была работа с C++ или нативными модулями — упомяни. Если нет — честно скажи, что работал с JS-стороной, знаешь концепцию JSI.</div>`
  },
  {
    tag: "rn", tagLabel: "React Native",
    q: "Что такое Native Modules и как ты их писал? Когда нужен native module vs просто JS?",
    a: `Native Module — bridge между JavaScript и нативным (ObjC/Swift, Java/Kotlin) кодом.<br><br>
<strong>Когда нужен:</strong>
<ul>
  <li>Доступ к platform API (Bluetooth, NFC, Camera hardware)</li>
  <li>Тяжёлые вычисления (image processing, crypto)</li>
  <li>Существующие нативные библиотеки (OpenCV, Salesforce SDK)</li>
</ul>
<pre>// Android: Java
@ReactMethod
public void processImage(String path, Promise promise) {
  // OpenCV или другая логика
  promise.resolve(result);
}

// JS side
NativeModules.ImageProcessor.processImage(path)
  .then(result => ...)</pre>
<strong>С New Architecture</strong> — через TurboModules + Codegen, типобезопасно.<br><br>
<div class="tip">💡 Упомяни, что в dbsapp работал с нативным слоем Android (MainActivity.kt, savedInstanceState) — это прямое доказательство.</div>`

<strong>Преимущества vs JavaScriptCore:</strong>
<ul>
  <li>Precompiled bytecode — JS компилируется в байткод при билде, не в рантайме → меньше TTI (Time to Interactive)</li>
  <li>Меньше потребление памяти</li>
  <li>Быстрее cold start (особенно заметно на Android)</li>
  <li>Garbage collector оптимизирован под мобильные ограничения</li>
</ul>
С RN 0.70+ Hermes включён по умолчанию. Дебаггинг через Chrome DevTools / Flipper с поддержкой Hermes.`

    q: "Как организовать Offline-First архитектуру в React Native без Salesforce SmartStore?",
    a: `Варианты хранилищ:<br>
<ul>
  <li><strong>WatermelonDB</strong> — реактивная, синхронизация с backend, lazy loading больших датасетов</li>
  <li><strong>SQLite (react-native-sqlite-storage / op-sqlite)</strong> — прямой SQL, полный контроль</li>
  <li><strong>MMKV</strong> — быстрый key-value (замена AsyncStorage, в 30x быстрее)</li>
  <li><strong>AsyncStorage</strong> — только для простых данных, не для offline-first</li>
</ul>
<strong>Паттерн Offline-First:</strong>
<ul>
  <li>Локальное хранилище — source of truth</li>
  <li>Optimistic updates — UI обновляется сразу, sync в фоне</li>
  <li>Conflict resolution strategy (last-write-wins, server-wins, merge)</li>
  <li>Background sync (NetInfo + queue)</li>
</ul>
<pre>NetInfo.addEventListener(state => {
  if (state.isConnected) {
    syncQueue.flush(); // отправить накопленные операции
  }
});</pre>`
  },
  {
    tag: "rn", tagLabel: "React Native",
    q: "Объясни разницу между useCallback, useMemo и React.memo. Когда каждый из них реально нужен?",
    a: `<ul>
  <li><strong>React.memo</strong> — HOC, мемоизирует компонент целиком. Перерисовка только если props изменились (shallow compare).</li>
  <li><strong>useMemo</strong> — мемоизирует результат вычисления. Для тяжёлых derivations.</li>
  <li><strong>useCallback</strong> — мемоизирует функцию. Нужен когда передаёшь коллбэк в memo-компонент или в deps другого хука.</li>
</ul>
<strong>Реальные кейсы когда НЕ нужны:</strong> если компонент и так рендерится быстро — преждевременная оптимизация. useMemo сам стоит памяти.<br><br>
<strong>Когда нужны (React Native специфика):</strong> FlatList renderItem обязательно в useCallback, иначе каждый рендер пересоздаёт функцию и дочерние айтемы перерисовываются.
<pre>const renderItem = useCallback(({ item }) => (
  &lt;ItemCard item={item} onPress={handlePress} /&gt;
), [handlePress]);</pre>`
  },
  {
    tag: "rn", tagLabel: "React Native",
    q: "Как правильно работать с FlatList для больших датасетов (10k+ записей)?",
    a: `<strong>Ключевые пропсы:</strong>
<ul>
  <li><code>windowSize</code> — количество экранов выше/ниже видимой области (default 21, снижай до 5–7)</li>
  <li><code>maxToRenderPerBatch</code> — сколько элементов за один batch (default 10)</li>
  <li><code>initialNumToRender</code> — только видимые при маунте</li>
  <li><code>getItemLayout</code> — если высота fixed, убирает измерения полностью</li>
  <li><code>removeClippedSubviews</code> — удаляет off-screen views из native дерева (Android особенно)</li>
  <li><code>keyExtractor</code> — стабильные уникальные ключи</li>
</ul>
<strong>Дополнительно:</strong> Virtualization (FlashList от Shopify в 10x быстрее нативного FlatList), lazy image loading, memo на item компонентах.<br><br>
<div class="tip">💡 FlashList — в продакшне уже стандарт де-факто для перформанс-критичных списков.</div>`
  },
  {
    tag: "rn", tagLabel: "React Native",
    q: "Что такое Reanimated 2/3 и зачем он нужен вместо Animated API?",
    a: `<strong>Стандартный Animated API</strong> — работает через bridge, анимации могут дропать кадры при нагрузке JS треда.<br><br>
<strong>Reanimated 2/3</strong> — анимации выполняются на UI thread напрямую (через Worklets — маленькие JS функции, компилируемые в native).<br>
<ul>
  <li>60/120fps гарантировано даже при heavy JS работе</li>
  <li><code>useSharedValue</code>, <code>useAnimatedStyle</code>, <code>withSpring</code>, <code>withTiming</code></li>
  <li>Gesture Handler интеграция (pan, pinch, swipe)</li>
</ul>
<pre>const offset = useSharedValue(0);
const animatedStyles = useAnimatedStyle(() => ({
  transform: [{ translateX: offset.value }],
}));
// Worklet — выполняется на UI thread</pre>`
  },
  {
    tag: "rn", tagLabel: "React Native",
    q: "Как организовать навигацию в большом React Native приложении?",

<strong>Структура для enterprise app:</strong>
<ul>
  <li>RootNavigator — auth check → AuthStack или AppStack</li>
  <li>AppStack — BottomTabNavigator (основные разделы)</li>

<strong>Soup</strong> — аналог таблицы/коллекции в SmartStore. Каждый Soup хранит JSON-объекты.<br><br>
<strong>Основные операции:</strong>
<ul>

  <li><code>removeFromSoup</code> — удалить</li>
</ul>
<pre>// Регистрация Soup
SFSmartStore.registerSoup("Contacts", [
  { path: "Id", type: "string" },
  { path: "LastName", type: "string" }
]);

// Smart Query
const query = SmartStore.buildSmartQuerySpec(
  "SELECT {Contacts:Name} FROM {Contacts} WHERE {Contacts:AccountId} = '001xxx'", 10
);</pre>`

<strong>Sync Down</strong> — получить данные из Salesforce в SmartStore:
<ul>
  <li>SOQL target — произвольный SOQL запрос</li>
  <li>SOSL target — поиск</li>
  <li>Metadata target — описания объектов</li>
  <li>Layout target — page layouts</li>
</ul>
<strong>Sync Up</strong> — отправить локальные изменения в Salesforce:
<ul>
  <li>Отслеживает записи с флагами <code>__locally_created__</code>, <code>__locally_updated__</code>, <code>__locally_deleted__</code></li>

    a: `<strong>Redux Thunk</strong> — middleware позволяет dispatch функций (не только объектов). Функция получает dispatch + getState.<br>
Когда: простые async flows, conditional dispatching, большинство продуктовых сценариев.<br><br>
<strong>Redux Saga</strong> — middleware на основе Generator functions. Использует Effects (call, put, take, fork, race, all).<br>
Когда: сложная оркестрация (retry логика, cancellation, параллельные потоки, event channels).<br><br>
<strong>Для Salesforce sync:</strong> Saga удобна — можно написать saga, которая слушает connectivity-события, отменяет синхронизации, обрабатывает retry с backoff.
<pre>function* syncSaga() {
  while (true) {
    yield take('SYNC_REQUESTED');
    try {
      const result = yield call(salesforceSync);
      yield put(syncCompleted(result));
    } catch (e) {
      yield put(syncFailed(e));
      yield delay(RETRY_DELAY);
    }
  }
}</pre>`

</ul>

// Render
const list = document.getElementById('list');
const qcount = document.getElementById('qcount');
let activeTag = 'all';
let searchQ = '';

function render() {
  const filtered = QUESTIONS.filter(q => {
    const tagMatch = activeTag === 'all' || q.tag === activeTag;
    const searchMatch = !searchQ || q.q.toLowerCase().includes(searchQ) || q.a.toLowerCase().includes(searchQ);
    return tagMatch && searchMatch;
  });
  qcount.textContent = `Показано вопросов: ${filtered.length}`;
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">Ничего не найдено</div>';
    return;
  }
  list.innerHTML = filtered.map((q, i) => `
    <div class="card" data-idx="${QUESTIONS.indexOf(q)}">
      <div class="card-header">
        <span class="q-num">${i + 1}.</span>
        <span class="q-text">${q.q}</span>
        <span class="tag tag-${q.tag}">${q.tagLabel}</span>
        <span class="chevron">▼</span>
      </div>
      <div class="card-body">${q.a}</div>
    </div>
  `).join('');
  list.querySelectorAll('.card-header').forEach(h => {
    h.addEventListener('click', () => {
      h.closest('.card').classList.toggle('open');
    });
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTag = btn.dataset.tag;
    render();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value.toLowerCase();
  render();
});

render();
</script>
